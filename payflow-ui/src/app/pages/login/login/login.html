<div class="login-container">

  <h2>Login</h2>

  <form (ngSubmit)="login()">

    <div class="form-group">
      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      />
    </div>

    <div class="form-group">
      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      />
    </div>

    <button type="submit">Login</button>

  </form>

</div>
